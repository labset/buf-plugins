syntax = "proto3";

package user.v1;

import "google/protobuf/timestamp.proto";
import "user/v1/enums.proto";

option go_package = "user/v1;userV1";

message User {
  string id = 1;
  string email = 2;
  string display_name = 3;
  UserStatus status = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}
